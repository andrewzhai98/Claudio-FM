<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claudio FM — Visualizer Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Doto:wght@400;600&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body {
    height:100%; width:100%;
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0f;
    color: #fff;
    display: grid; place-items: center;
  }
  
  .stage {
    position:relative; width:616px; max-width:calc(100vw - 48px);
    height:min(720px, calc(100vh - 48px));
    border-radius:28px; overflow:hidden;
    display:flex; flex-direction:column;
    background:rgba(10,10,14,.94);
    border:1px solid rgba(255,255,255,0.18);
    box-shadow: rgba(0,0,0,.55) 0px 40px 90px -20px;
  }

  /* ── Fluid background blobs (same as production) ── */
  .fluid {
    position:absolute; border-radius:50%;
    filter:blur(142px) saturate(1.1);
    opacity:.7; mix-blend-mode:screen;
    pointer-events:none;
  }
  .fluid.blue {
    width:70vmin; height:70vmin;
    left:50%; top:50%;
    margin-left:-35vmin; margin-top:-35vmin;
    background:radial-gradient(circle at 40% 40%, oklch(0.62 0.17 256) 0%, oklch(0.48 0.18 259) 40%, oklch(0.3 0.12 261 / 0) 72%);
    animation:26s cubic-bezier(.45,.05,.55,.95) 0s infinite flow-blue;
  }
  .fluid.violet {
    width:66vmin; height:66vmin;
    left:50%; top:50%; margin-left:-33vmin; margin-top:-33vmin;
    background:radial-gradient(circle, oklch(0.58 0.19 330) 0%, oklch(0.42 0.2 325) 42%, oklch(0.28 0.14 320 / 0) 72%);
    animation:34s cubic-bezier(.45,.05,.55,.95) 0s infinite flow-violet;
  }
  .fluid.accent {
    width:42vmin; height:42vmin;
    left:50%; top:50%; margin-left:-21vmin; margin-top:-21vmin;
    opacity:.55; filter:blur(114px) saturate(1.1);
    background:radial-gradient(circle, oklch(0.7 0.18 293) 0%, oklch(0.5 0.18 288) 45%, oklch(0.3 0.12 283 / 0) 72%);
    animation:42s cubic-bezier(.45,.05,.55,.95) 0s infinite flow-accent;
  }
  @keyframes flow-blue {
    0%   { transform:translate(-22vmin,-14vmin) scale(1) rotate(0deg); }
    20%  { transform:translate(8vmin,-22vmin) scale(1.1) rotate(40deg); }
    40%  { transform:translate(24vmin,-4vmin) scale(0.95) rotate(80deg); }
    60%  { transform:translate(14vmin,18vmin) scale(1.12) rotate(120deg); }
    80%  { transform:translate(-10vmin,12vmin) scale(0.98) rotate(160deg); }
    100% { transform:translate(-22vmin,-14vmin) scale(1) rotate(360deg); }
  }
  @keyframes flow-violet {
    0%   { transform:translate(20vmin,16vmin) scale(1.05); }
    20%  { transform:translate(-12vmin,22vmin) scale(0.94); }
    40%  { transform:translate(-26vmin,2vmin) scale(1.14); }
    60%  { transform:translate(-10vmin,-18vmin) scale(0.92); }
    80%  { transform:translate(12vmin,-12vmin) scale(1.08); }
    100% { transform:translate(20vmin,16vmin) scale(1.05) rotate(-360deg); }
  }
  @keyframes flow-accent {
    0%   { transform:translate(2vmin,-4vmin) scale(1); }
    25%  { transform:translate(-18vmin,6vmin) scale(1.15); }
    50%  { transform:translate(6vmin,18vmin) scale(0.88); }
    75%  { transform:translate(20vmin,-8vmin) scale(1.1); }
    100% { transform:translate(2vmin,-4vmin) scale(1); }
  }

  /* ── Top bar ── */
  .topbar {
    flex:0 0 auto; display:flex; justify-content:space-between; align-items:center;
    padding:18px 24px 14px; border-bottom:1px solid rgba(255,255,255,0.08);
    position:relative; z-index:5;
  }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand-dot {
    width:28px; height:28px; border-radius:50%;
    background:linear-gradient(135deg, oklch(0.62 0.17 256), oklch(0.58 0.19 330));
    box-shadow:0 0 0 1px rgba(255,255,255,0.18);
    display:grid; place-items:center; font-size:13px; color:#fff; font-family:Doto,monospace;
  }
  .brand-name {
    font-family:Doto,'Space Mono',monospace;
    font-size:22px; font-weight:400; letter-spacing:.06em; color:rgba(255,255,255,0.92);
  }
  .onair-indicator { display:flex; align-items:center; gap:8px; color:#29ffb8; font-size:10px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; }
  .onair-dot { width:6px; height:6px; border-radius:50%; background:#29ffb8; box-shadow:rgba(41,255,184,.6) 0 0 8px; animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.4;transform:scale(.8);} 50%{opacity:1;transform:scale(1.1);} }

  /* ── Hero clock ── */
  .hero-clock {
    flex:0 0 auto; display:flex; flex-direction:column; align-items:center;
    padding:28px 24px 18px; border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .hero-time { font-size:clamp(48px,11vw,96px); font-weight:400; letter-spacing:.04em; color:rgba(255,255,255,0.95); line-height:.88; }
  .hero-date { margin-top:10px; font-size:12px; color:rgba(255,255,255,0.45); }

  /* ── Player section (NO audio bars here anymore) ── */
  .player-section {
    flex:0 0 auto; padding:16px 24px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    display:flex; align-items:center; gap:16px; min-height:64px;
  }
  .now-playing { flex:1 1 auto; min-width:0; }
  .now-playing-title { font-size:15px; font-weight:600; color:rgba(255,255,255,0.92); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .now-playing-artist { font-size:11px; color:rgba(255,255,255,0.45); margin-top:2px; letter-spacing:.04em; }
  .player-time-display { font-size:12px; color:rgba(255,255,255,0.5); flex-shrink:0; }
  .play-btn {
    flex:0 0 auto; width:36px; height:36px; border-radius:999px;
    background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.18);
    color:rgba(255,255,255,0.85); display:grid; place-items:center; cursor:pointer;
    transition:transform .12s; padding:0;
  }
  .play-btn:hover { transform:scale(1.06); background:rgba(255,255,255,0.2); }

  /* ═══════════════════════════════════════════════════
     FULL-WIDTH COLORFUL VISUALIZER BAR (the new design)
     ═══════════════════════════════════════════════════ */
  .visualizer-section {
    flex:0 0 auto;
    padding: 12px 24px 16px;
    display:flex; flex-direction:column; gap:8px;
    /* subtle inner glow from above */
    background:linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
  }
  
  .visualizer-label {
    display:flex; justify-content:space-between; align-items:center;
    font-size:9px; letter-spacing:.14em; text-transform:uppercase;
    color:rgba(255,255,255,0.25);
    padding:0 4px;
  }
  .viz-live-dot {
    display:inline-flex; align-items:center; gap:5px; color:#29ffb8;
  }
  .viz-live-dot::before {
    content:''; width:5px; height:5px; border-radius:50%;
    background:#29ffb8; box-shadow:0 0 6px rgba(41,255,184,0.6);
    animation:pulse 1.2s ease-in-out infinite;
  }

  /* The bar container — full width */
  .visualizer-bars {
    display:flex; align-items:flex-end; justify-content:stretch;
    gap:3px; height:56px; width:100%;
    padding:0 4px;
  }
  
  /* Each individual bar — rounded top, gradient fill */
  .viz-bar {
    flex:1 1 0%;
    min-width:2px; max-width:14px;
    border-radius:4px 4px 2px 2px;
    height:8%;
    min-height:3px;
    transition:height 0.06s ease-out;
    position:relative;
    /* Default gradient — will be overridden by JS with per-bar color */
    background:linear-gradient(180deg, 
      rgba(41,255,184,0.9) 0%, 
      rgba(41,180,255,0.6) 60%,
      rgba(120,100,255,0.3) 100%
    );
    box-shadow:0 0 8px rgba(41,255,184,0.15);
  }
  
  /* Glow overlay on each bar */
  .viz-bar::after {
    content:''; position:absolute; inset:0;
    border-radius:inherit;
    background:linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 60%);
    opacity:0.5;
  }

  /* Peak indicator line */
  .visualizer-peak-line {
    height:1px; width:100%;
    background:linear-gradient(90deg, 
      transparent 0%,
      rgba(41,255,184,0.15) 20%,
      rgba(41,255,184,0.25) 50%,
      rgba(41,255,184,0.15) 80%,
      transparent 100%
    );
    margin-top:-4px;
  }

  /* ═══ Mini scrubber below viz ═══ */
  .mini-scrubber {
    flex:0 0 auto;
    height:4px; margin:0 24px;
    background:rgba(255,255,255,0.08);
    border-radius:999px; position:relative;
    cursor:pointer;
  }
  .mini-scrubber-progress {
    height:100%; width:35%;
    background:rgba(255,255,255,0.5);
    border-radius:999px;
    transition:width 0.1s linear;
  }

  /* ── Meta bar ── */
  .meta-bar {
    flex:0 0 auto; padding:10px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    border-top:1px solid rgba(255,255,255,0.04);
  }
  .meta-name { font-size:13px; font-weight:500; color:rgba(255,255,255,0.75); }
  .meta-sub { font-size:11px; color:rgba(255,255,255,0.4); }
  .replay-btn { background:none; border:none; cursor:pointer; font-size:10.5px; color:rgba(255,255,255,0.35); letter-spacing:.03em; }
  .replay-btn:hover { color:rgba(255,255,255,0.7); }

  /* ── Demo controls ── */
  .demo-controls {
    position:fixed; right:16px; bottom:16px; z-index:200;
    background:rgba(20,20,22,.92); backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.12); border-radius:16px;
    padding:14px 16px; color:#fff; font-size:12px; width:220px;
  }
  .demo-controls h3 { font-size:11px; font-weight:600; margin:0 0 10px; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.5); }
  .demo-row { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
  .demo-row:last-child { margin-bottom:0; }
  .demo-row label { font-size:11px; color:rgba(255,255,255,.65); display:flex; justify-content:space-between; }
  .demo-row input[type="range"] { width:100%; accent-color:#29ffb8; }
  .demo-btns { display:flex; gap:6px; }
  .demo-btns button {
    flex:1; height:30px; border:none; border-radius:999px;
    background:rgba(255,255,255,.08); color:rgba(255,255,255,.65);
    font:600 11px/1 Inter,sans-serif; cursor:pointer;
    transition:background .15s, color .15s;
  }
  .demo-btns button:hover { background:rgba(255,255,255,.16); color:#fff; }
  .demo-btns button.active { background:#29ffb8; color:#0a0a0f; }

  /* Color theme selector */
  .theme-row { display:flex; gap:6px; flex-wrap:wrap; }
  .theme-swatch {
    width:32px; height:24px; border-radius:6px; cursor:pointer;
    border:2px solid transparent; transition:transform .12s, border-color .12s;
  }
  .theme-swatch:hover { transform:scale(1.08); }
  .theme-swatch.active { border-color:#fff; }
</style>
</head>
<body>

<div class="stage">
  <div class="fluid blue"></div>
  <div class="fluid violet"></div>
  <div class="fluid accent"></div>

  <div class="card" id="fmCard">

    <!-- Top bar -->
    <div class="topbar">
      <div class="brand">
        <div class="brand-dot">C</div>
        <div class="brand-name">Claudio</div>
      </div>
      <div class="onair-indicator">
        <span class="onair-dot"></span> ON AIR
      </div>
    </div>

    <!-- Hero clock -->
    <div class="hero-clock">
      <div class="hero-time" id="heroTime">1:23</div>
      <div class="hero-date">Sunday, June 21</div>
    </div>

    <!-- Player section (clean, no bars on left) -->
    <div class="player-section">
      <div class="now-playing">
        <div class="now-playing-title">Skinny Love</div>
        <div class="now-playing-artist">Now Playing · Bon Iver</div>
      </div>
      <div class="player-time-display">0:56</div>
      <button class="play-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="3" y="2" width="2.5" height="10" rx="0.8"/><rect x="8.5" y="2" width="2.5" height="10" rx="0.8"/></svg>
      </button>
    </div>

    <!-- ═══ FULL-WIDTH VISUALIZER ═══ -->
    <div class="visualizer-section" id="visualizerSection">
      <div class="visualizer-label">
        <span>FREQUENCY</span>
        <span class="viz-live-dot">LIVE</span>
      </div>
      <div class="visualizer-bars" id="vizBars">
        <!-- Bars generated by JS -->
      </div>
      <div class="visualizer-peak-line"></div>
    </div>

    <!-- Mini progress scrubber -->
    <div class="mini-scrubber">
      <div class="mini-scrubber-progress" id="scrubberProgress"></div>
    </div>

    <!-- Meta bar -->
    <div class="meta-bar">
      <div><span class="meta-name">Skinny Love</span></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="meta-sub">♪ Skinny Love — Bon Iver</span>
        <button class="replay-btn">↻ replay</button>
      </div>
    </div>

  </div><!-- .card -->
</div><!-- .stage -->

<!-- Demo controls panel -->
<div class="demo-controls">
  <h3>Visualizer Controls</h3>
  <div class="demo-row">
    <label>Intensity <span id="lblIntensity">70%</span></label>
    <input type="range" id="inIntensity" min="0" max="100" value="70">
  </div>
  <div class="demo-row">
    <label>Bar Count <span id="lblBarCount">48</span></label>
    <input type="range" id="inBarCount" min="16" max="96" value="48">
  </div>
  <div class="demo-row">
    <label>Smoothing <span id="lblSmooth">Medium</span></label>
    <input type="range" id="inSmooth" min="1" max="5" value="3">
  </div>
  <div class="demo-row">
    <label>Color Theme</label>
    <div class="theme-row" id="themeRow">
      <div class="theme-swatch active" data-theme="cosmic" style="background:linear-gradient(135deg,#29ffb8,#29b4ff,#7864ff)"></div>
      <div class="theme-swatch" data-theme="sunset" style="background:linear-gradient(135deg,#ff6b6b,#ffa94d,#ffec99)"></div>
      <div class="theme-swatch" data-theme="aurora" style="background:linear-gradient(135deg,#00f5d4,#00bbf9,#9b5de5,#f15bb5)"></div>
      <div class="theme-swatch" data-theme="fire" style="background:linear-gradient(135deg,#ff0844,#ffb199)"></div>
      <div class="theme-swatch" data-theme="ocean" style="background:linear-gradient(135deg,#0077b6,#00b4d8,#90e0ef)"></div>
      <div class="theme-swatch" data-theme="mono" style="background:linear-gradient(135deg,#fff,#888,#444)"></div>
    </div>
  </div>
  <div class="demo-row demo-btns">
    <button id="btnPlay" class="active">▶ Playing</button>
    <button id="btnPause">❚❚ Paused</button>
  </div>
</div>

<audio id="music-audio" crossorigin="anonymous" style="display:none"></audio>

<script>
// ══════════════════════════════════════════════════
//  CONFIGURATION & STATE
// ══════════════════════════════════════════════════
const VIZ_CONTAINER = document.getElementById('vizBars');
const MUSIC_AUDIO = document.getElementById('music-audio');
const SCRUBBER_PROGRESS = document.getElementById('scrubberProgress');

let barCount = 48;
let intensity = 0.7;
let smoothing = 3; // 1=sharp ... 5=very smooth
let isPlaying = true;
let currentTheme = 'cosmic';
let rafId = null;

// Color themes — array of [position, color] stops for gradient
const THEMES = {
  cosmic: [
    [0,   'rgba(41,255,184,0.95)'],
    [0.25, 'rgba(41,180,255,0.85)'],
    [0.5,  'rgba(120,100,255,0.75)'],
    [0.75, 'rgba(180,80,255,0.6)'],
    [1,    'rgba(255,100,150,0.45)'],
  ],
  sunset: [
    [0,   'rgba(255,107,107,0.95)'],
    [0.3,  'rgba(255,169,77,0.85)'],
    [0.6,  'rgba(255,236,153,0.7)'],
    [1,    'rgba(255,200,100,0.5)'],
  ],
  aurora: [
    [0,   'rgba(0,245,212,0.95)'],
    [0.2,  'rgba(0,187,249,0.88)'],
    [0.45, 'rgba(155,93,229,0.8)'],
    [0.7,  'rgba(241,91,181,0.7)'],
    [1,    'rgba(255,130,180,0.5)'],
  ],
  fire: [
    [0,   'rgba(255,8,68,0.95)'],
    [0.4,  'rgba(255,100,50,0.85)'],
    [0.7,  'rgba(255,177,153,0.7)'],
    [1,    'rgba(255,230,200,0.5)'],
  ],
  ocean: [
    [0,   'rgba(0,119,182,0.9)'],
    [0.35, 'rgba(0,180,216,0.85)'],
    [0.65, 'rgba(144,224,239,0.7)'],
    [1,    'rgba(200,240,255,0.5)'],
  ],
  mono: [
    [0,   'rgba(255,255,255,0.95)'],
    [0.5,  'rgba(200,200,200,0.7)'],
    [1,    'rgba(100,100,100,0.45)'],
  ],
};

const GLOW_THEMES = {
  cosmic: 'rgba(41,255,184,0.2)',
  sunset: 'rgba(255,169,77,0.2)',
  aurora:  'rgba(155,93,229,0.2)',
  fire:   'rgba(255,100,50,0.2)',
  ocean:  'rgba(0,180,216,0.2)',
  mono:   'rgba(255,255,255,0.12)',
};

// ══════════════════════════════════════════════════
//  BUILD BARS
// ══════════════════════════════════════════════════
function buildBars(count) {
  VIZ_CONTAINER.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const bar = document.createElement('div');
    bar.className = 'viz-bar';
    // Assign per-bar gradient position based on index (left→right across spectrum)
    applyBarGradient(bar, i, count);
    VIZ_CONTAINER.appendChild(bar);
  }
}

function applyBarGradient(bar, idx, total) {
  const stops = THEMES[currentTheme];
  const t = total > 1 ? idx / (total - 1) : 0;
  
  // Find two surrounding stops and interpolate
  const gradStops = [];
  for (let s = 0; s < stops.length; s++) {
    if (stops[s][0] <= t || s === stops.length - 1) {
      gradStops.push(stops[s][1]);
    } else {
      break;
    }
  }
  // Build gradient: full height uses all colors mapped left-to-right
  const gradParts = stops.map(([pos, col]) => `${col} ${Math.round(pos*100)}%`).join(', ');
  bar.style.background = `linear-gradient(180deg, ${gradParts})`;
  bar.style.boxShadow = `0 0 ${6 + Math.random()*8}px ${GLOW_THEMES[currentTheme]}`;
}

function refreshAllBarGradients() {
  const bars = VIZ_CONTAINER.querySelectorAll('.viz-bar');
  bars.forEach((bar, i) => applyBarGradient(bar, i, bars.length));
}

// ══════════════════════════════════════════════════
//  SIMULATED AUDIO DATA (works without real audio)
// ══════════════════════════════════════════════════
let simTime = 0;
const freqBands = []; // one per bar, independent phase

function initSimData(count) {
  freqBands.length = 0;
  for (let i = 0; i < count; i++) {
    // Bass frequencies (left) have slower oscillation, treble (right) faster
    const baseFreq = 0.4 + (i / count) * 3.5; // Hz equivalent
    const phase = Math.random() * Math.PI * 2;
    const ampVariation = 0.5 + Math.random() * 0.5; // some bands naturally quieter
    freqBands.push({ baseFreq, phase, ampVariation });
  }
}

// Try real audio first, fall back to simulation
let audioCtx = null;
let analyser = null;
let useRealAudio = false;

async function tryInitRealAudio() {
  // Create a silent oscillator for demo purposes
  // In production this would use createMediaElementSource(musicAudio)
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.75;
    
    // Create oscillator + gain for demo sound
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = 110;
    gain.gain.value = 0.03; // very quiet
    osc.connect(gain);
    gain.connect(analyser);
    analyser.connect(audioCtx.destination);
    
    // Add a modulator for more interesting waveform
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.type = 'sine';
    lfo.frequency.value = 0.5;
    lfoGain.gain.value = 40;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start();
    
    osc.start();
    useRealAudio = true;
    console.log('[viz] Real audio engine running');
  } catch(e) {
    console.warn('[viz] Using simulation mode', e);
    useRealAudio = false;
  }
}

// ══════════════════════════════════════════════════
//  ANIMATION LOOP
// ══════════════════════════════════════════════════
function animate() {
  rafId = requestAnimationFrame(animate);
  simTime += 0.016; // ~60fps
  
  const bars = VIZ_CONTAINER.querySelectorAll('.viz-bar');
  const bufferLength = analyser ? analyser.frequencyBinCount : 0;
  const dataArray = useRealAudio ? new Uint8Array(bufferLength) : null;
  
  if (useRealAudio && analyser) {
    analyser.getByteFrequencyData(dataArray);
  }
  
  const smoothFactor = [0.85, 0.8, 0.75, 0.65, 0.5][smoothing - 1] || 0.75;
  
  bars.forEach((bar, i) => {
    let value;
    
    if (useRealAudio && dataArray) {
      // Map bar index to frequency bins
      const binIdx = Math.floor((i / bars.length) * (dataArray.length * 0.7)) + Math.floor(dataArray.length * 0.1);
      const raw = dataArray[Math.min(binIdx, dataArray.length - 1)] || 0;
      value = raw / 255;
    } else {
      // Simulated — layered sine waves for organic feel
      const band = freqBands[i];
      const bass = Math.sin(simTime * band.baseFreq * 0.5 + band.phase) * 0.3 + 0.5;
      const mid  = Math.sin(simTime * band.baseFreq * 1.3 + band.phase * 1.7) * 0.25 + 0.5;
      const high = Math.sin(simTime * band.baseFreq * 2.7 + band.phase * 3.1) * 0.15 + 0.5;
      const beat = Math.pow(Math.sin(simTime * 2.2) * 0.5 + 0.5, 3); // kick pulse
      
      value = (bass * 0.4 + mid * 0.35 + high * 0.15 + beat * 0.2) * band.ampVariation;
      
      // Add some randomness/noise
      value += (Math.random() - 0.5) * 0.08;
      
      // Apply intensity
      value *= intensity;
    }
    
    // Clamp
    value = Math.max(0.04, Math.min(1, value));
    
    // Height: 4% → 100%
    const heightPct = 4 + value * 96;
    bar.style.height = heightPct + '%';
    
    // Dynamic glow based on amplitude
    if (value > 0.6) {
      const glowSize = 4 + (value - 0.6) * 20;
      bar.style.boxShadow = `0 0 ${glowSize}px ${GLOW_THEMES[currentTheme]}, 0 0 ${glowSize/2}px ${GLOW_THEMES[currentTheme]} inset`;
    } else {
      bar.style.boxShadow = `0 0 4px ${GLOW_THEMES[currentTheme]}`;
    }
  });
  
  // Animate mini scrubber
  const scrubPos = ((simTime * 2) % 100);
  SCRUBBER_PROGRESS.style.width = scrubPos + '%';
}

// ══════════════════════════════════════════════════
//  CONTROLS
// ══════════════════════════════════════════════════
document.getElementById('inIntensity').addEventListener('input', e => {
  intensity = e.target.value / 100;
  document.getElementById('lblIntensity').textContent = Math.round(intensity * 100) + '%';
});

document.getElementById('inBarCount').addEventListener('input', e => {
  barCount = parseInt(e.target.value);
  document.getElementById('lblBarCount').textContent = barCount;
  buildBars(barCount);
  initSimData(barCount);
});

document.getElementById('inSmooth').addEventListener('input', e => {
  smoothing = parseInt(e.target.value);
  const labels = ['Very Sharp', 'Sharp', 'Medium', 'Smooth', 'Very Smooth'];
  document.getElementById('lblSmooth').textContent = labels[smoothing - 1] || 'Medium';
});

document.getElementById('themeRow').addEventListener('click', e => {
  const swatch = e.target.closest('.theme-swatch');
  if (!swatch) return;
  currentTheme = swatch.dataset.theme;
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.toggle('active', s === swatch));
  refreshAllBarGradients();
});

document.getElementById('btnPlay').addEventListener('click', () => {
  isPlaying = true;
  document.getElementById('btnPlay').classList.add('active');
  document.getElementById('btnPause').classList.remove('active');
  if (!rafId) animate();
});

document.getElementById('btnPause').addEventListener('click', () => {
  isPlaying = false;
  document.getElementById('btnPause').classList.add('active');
  document.getElementById('btnPlay').classList.remove('active');
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  // Reset bars
  VIZ_CONTAINER.querySelectorAll('.viz-bar').forEach(b => { b.style.height = '4%'; b.style.boxShadow = `0 0 4px ${GLOW_THEMES[currentTheme]}`; });
});

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
buildBars(barCount);
initSimData(barCount);

// Update hero clock
function updateClock() {
  const now = new Date();
  const h = now.getHours(); const m = String(now.getMinutes()).padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM'; const h12 = h % 12 || 12;
  document.getElementById('heroTime').textContent = `${h12}:${m}`;
}
updateClock();
setInterval(updateClock, 10000);

// Start animation
animate();

console.log('[demo] Visualizer demo loaded —', barCount, 'bars,', currentTheme, 'theme');
